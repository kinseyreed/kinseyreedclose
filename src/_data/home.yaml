about:
  kicker: About Me
  heading: Bridging ecology and agronomy to build healthier soils and resilient
    ecosystems
  portrait: assets/IMG_4637.jpg
  paragraphs:
    - >-
      I am an interdisciplinary soil biogeochemist, microbial ecologist, and
      plant conservation biologist currently focused on determining how plant
      and microbial biodiversity shape soil health in Appalachian
      agroecosystems. Born and raised in West Virginia, I completed my PhD in
      Plant & Soil Science at West Virginia University, and I now work as a
      postdoctoral researcher in the Morrissey Microbial Ecology,
      Biogeochemistry & Soil Health Lab
      (https://morrisseyem.wixsite.com/morrisseywvu). I also have training in
      Animal & Nutritional Sciences and Environmental Microbiology from WVU, and
      have actual full-time work experience on local farms (dairy, vegetables,
      ornamentals and florals, hydroponics, orchards, and commodity crops) where
      I experienced first-hand the challenges and needs of modern producers.  


      Appalachia is one of the most biodiverse regions in the world, and I
      believe my experience, passion, and deep ties to the region enhance my
      ability to meaningfully study these complex and unique ecosystems that
      have experienced centuries of repeated resource extraction.
    - 'My research connects the "underground herd" of soil microbes, and the
      plants they partner with, to the practical questions farmers face: how do
      we keep nutrients (like nitrogen) in the ground where they are most
      needed; how is the "hydrological whiplash" Appalachia is experiencing
      impacting agroecosystems; and how do we build farm productivity, soil
      health (and carbon) under this increasingly stressful climate? I work in
      direct collaboration with Appalachian producers to translate cutting-edge
      research into applied practice, and assess its feasibility and benefits
      above and below-ground.'
