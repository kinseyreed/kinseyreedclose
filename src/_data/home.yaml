focus:
  kicker: What I've Done
  heading: Recent Work
  lead: Understanding the living soil, and putting that knowledge to work for
    farmers and the land.
  cards:
    - meta: "01"
      title: Microbes &amp; Soil Carbon
      body: Using quantitative stable isotope probing and other cutting-edge
        approaches to link microbial biodiversity to nitrogen cycling, carbon
        stabilization, and soil aggregate stability.
    - meta: "02"
      title: Pasture Biodiversity
      body: Characterizing plant community composition and structure across central
        Appalachian pastures and how diversity drives soil health.
    - meta: "03"
      title: Farmer Partnerships
      body: Co-designing soil health demonstration trials with Appalachian producers
        to make grazing more sustainable and carbon-smart.
projects:
  kicker: Current Projects
  heading: "What I'm Currently "
  cards:
    - meta: USDA AMP · 2024–2028 · $4.8M
      title: GRASS Project
      body_html: GRazing Appalachia SuStainably — working directly with <strong>135
        farmers</strong> to adopt climate-smart, soil-building grazing practices
        across the region. I serve as the Soil Health Specialist through WVU
        Extension's Small Farms Center.
    - meta: USDA NRCS CIG · 2022–2026 · $1.0M
      title: Diversifying Appalachia's Pastures
      body_html: A Conservation Innovation Grant soil health demonstration trial
        testing how pasture plant diversity improves soil health and carbon
        storage across <strong>17 working farms</strong> in West Virginia.
